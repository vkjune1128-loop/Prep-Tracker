<script>
  // ============================================================
  // FIREBASE SETUP -- replace this with your own project's config.
  // See README.md for step-by-step console instructions.
  // This config is NOT a secret; it's safe to have in client code --
  // access is controlled by Firestore security rules, not by hiding
  // this object. Do not skip setting up security rules though.
  // ============================================================
  const FIREBASE_CONFIG = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID",
  };
  const FIREBASE_CONFIGURED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";

  let firestoreDb = null;
  if (FIREBASE_CONFIGURED) {
    firebase.initializeApp(FIREBASE_CONFIG);
    firestoreDb = firebase.firestore();
    firestoreDb.enablePersistence({ synchronizeTabs: true }).catch((err) => {
      console.warn('[PrepTracker] Firestore offline persistence unavailable:', err.code);
    });
  }

  // Local-only fallback shim (used only before sign-in resolves, or if
  // Firebase isn't configured yet -- keeps the app from crashing).
  const memoryFallback = {};
  window.storage = {
    async get(key) {
      try {
        const v = localStorage.getItem(key);
        return v === null ? null : { key, value: v, shared: false };
      } catch (e) {
        return memoryFallback[key] !== undefined ? { key, value: memoryFallback[key], shared: false } : null;
      }
    },
    async set(key, value) {
      try { localStorage.setItem(key, value); } catch (e) { memoryFallback[key] = value; }
      return { key, value, shared: false };
    },
    async delete(key) {
      try { localStorage.removeItem(key); } catch (e) { delete memoryFallback[key]; }
      return { key, deleted: true, shared: false };
    },
    async list(prefix) {
      try {
        const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
        return { keys, prefix, shared: false };
      } catch (e) {
        return { keys: Object.keys(memoryFallback).filter(k => !prefix || k.startsWith(prefix)), prefix, shared: false };
      }
    }
  };

  // Firestore-backed storage, bound to a specific signed-in user. Swapped
  // into window.storage once sign-in completes (see AuthGate below). Keeps
  // the exact same interface, so PrepTracker's code needs zero changes.
  function createFirestoreStorage(uid) {
    const docRef = firestoreDb.collection('prepTrackerUsers').doc(uid);
    return {
      async get(key) {
        try {
          const snap = await docRef.get();
          if (!snap.exists) return null;
          const data = snap.data();
          return (key in data) ? { key, value: data[key], shared: false } : null;
        } catch (e) {
          console.error('[PrepTracker] Firestore get failed:', e);
          return null;
        }
      },
      async set(key, value) {
        await docRef.set({ [key]: value }, { merge: true });
        return { key, value, shared: false };
      },
      async delete(key) {
        try {
          await docRef.update({ [key]: firebase.firestore.FieldValue.delete() });
        } catch (e) { /* doc or field may not exist yet */ }
        return { key, deleted: true, shared: false };
      },
      async list(prefix) {
        try {
          const snap = await docRef.get();
          const data = snap.exists ? snap.data() : {};
          return { keys: Object.keys(data).filter(k => !prefix || k.startsWith(prefix)), prefix, shared: false };
        } catch (e) {
          return { keys: [], prefix, shared: false };
        }
      },
    };
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>

// Spaced-repetition gap schedule: after the Nth time a problem is marked
// done, wait this many plan-days before it's eligible to resurface as a
// review item. Gaps grow the more times it's been reviewed (classic
// Leitner-style curve), capped at the last value.
const REVIEW_GAPS = [3, 7, 14, 30];
function reviewGapFor(timesDone) {
  const idx = Math.min(timesDone - 1, REVIEW_GAPS.length - 1);
  return REVIEW_GAPS[Math.max(0, idx)];
}

// Builds today's list: unseen problems from today's rotating sub-pattern
// ("new"), plus previously-done problems whose spaced-repetition gap has
// elapsed ("review"). This is recomputed live from srs state rather than
// frozen, since spaced repetition is inherently dynamic -- checking things
// off today shouldn't hide already-due reviews for other patterns.
function getDailySelection(day, srs) {
  const subIdx = (day - 1) % SUBPATTERN_ORDER.length;
  const cycle = Math.floor((day - 1) / SUBPATTERN_ORDER.length) + 1;
  const sub = SUBPATTERN_ORDER[subIdx];
  const subEntries = PROBLEM_BANK.filter(e => e.topic === sub.topic && e.subPattern === sub.subPattern);
  const newItems = subEntries.filter(e => !srs[e.id]);
  const review = PROBLEM_BANK.filter(e => srs[e.id] && !newItems.includes(e)).map(e => {
    const s = srs[e.id];
    const dueInDays = s.lastDoneDay + reviewGapFor(s.timesDone) - day;
    return {
      entry: e,
      dueInDays
    };
  }).filter(x => x.dueInDays <= 0).sort((a, b) => a.dueInDays - b.dueInDays).slice(0, 3).map(x => x.entry);
  return {
    topic: sub.topic,
    subPattern: sub.subPattern,
    tier: sub.tier,
    cycle,
    newItems,
    review
  };
}

function computeStreakPatch(dailyPlan) {
  const today = todayStr();

  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const newStreak = dailyPlan.lastCompletedDate === yesterday ? dailyPlan.streak + 1 : 1;
  return {
    streak: newStreak,
    lastCompletedDate: today
  };
}
